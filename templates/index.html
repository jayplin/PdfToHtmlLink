<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF → Kobo</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,serif;background:#f5f5f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5em}
  .card{background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1);padding:2.5em 2em;max-width:480px;width:100%}
  h1{font-size:1.4em;margin-bottom:1.2em;color:#333}
  #drop{border:2px dashed #bbb;border-radius:6px;padding:2.5em 1em;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;color:#888;font-size:.95em}
  #drop.over{border-color:#555;background:#f9f9f6;color:#444}
  #file{display:none}
  #progress{display:none;margin-top:1.2em}
  .bar-wrap{background:#eee;border-radius:4px;height:6px;overflow:hidden}
  .bar{background:#555;width:0%;height:100%;transition:width .3s}
  #status{font-size:.85em;color:#666;margin-top:.5em}
  #result{display:none;margin-top:1.4em}
  #result label{font-size:.8em;color:#888;display:block;margin-bottom:.3em}
  .url-row{display:flex;gap:.5em}
  #url-box{flex:1;font-family:monospace;font-size:.8em;border:1px solid #ddd;border-radius:4px;padding:.45em .6em;background:#fafafa;word-break:break-all}
  #copy-btn{white-space:nowrap;padding:.45em .9em;border:1px solid #bbb;border-radius:4px;background:#fff;cursor:pointer;font-size:.85em}
  #copy-btn:active{background:#eee}
  #meta{font-size:.82em;color:#888;margin-top:.6em}
  #error{display:none;margin-top:1em;color:#c0392b;font-size:.85em}
</style>
</head>
<body>
<div class="card">
  <h1>PDF → Kobo</h1>
  <div id="drop">
    Drop a PDF here or <u>click to browse</u>
    <input id="file" type="file" accept=".pdf">
  </div>
  <div id="progress">
    <div class="bar-wrap"><div class="bar" id="bar"></div></div>
    <div id="status">Uploading…</div>
  </div>
  <div id="result">
    <label>GitHub Pages URL</label>
    <div class="url-row">
      <div id="url-box"></div>
      <button id="copy-btn">Copy</button>
    </div>
    <div id="meta"></div>
  </div>
  <div id="error"></div>
</div>
<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const progress = document.getElementById('progress');
const bar = document.getElementById('bar');
const status = document.getElementById('status');
const result = document.getElementById('result');
const urlBox = document.getElementById('url-box');
const copyBtn = document.getElementById('copy-btn');
const meta = document.getElementById('meta');
const errorDiv = document.getElementById('error');

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

function handleFile(file) {
  if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
    showError('Please select a PDF file.');
    return;
  }
  errorDiv.style.display = 'none';
  result.style.display = 'none';
  progress.style.display = 'block';
  bar.style.width = '10%';
  status.textContent = 'Uploading…';

  const fd = new FormData();
  fd.append('file', file);

  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/upload');
  xhr.upload.onprogress = e => {
    if (e.lengthComputable) bar.style.width = (e.loaded / e.total * 80) + '%';
  };
  xhr.onload = () => {
    bar.style.width = '100%';
    if (xhr.status === 200) {
      const data = JSON.parse(xhr.responseText);
      status.textContent = 'Done.';
      urlBox.textContent = data.url;
      meta.textContent = `"${data.title}" · ${data.words.toLocaleString()} words`;
      result.style.display = 'block';
    } else {
      progress.style.display = 'none';
      try { showError(JSON.parse(xhr.responseText).detail); }
      catch { showError('Upload failed (' + xhr.status + ')'); }
    }
  };
  xhr.onerror = () => { progress.style.display = 'none'; showError('Network error.'); };
  xhr.send(fd);
}

copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(urlBox.textContent).then(() => {
    copyBtn.textContent = 'Copied!';
    setTimeout(() => copyBtn.textContent = 'Copy', 1500);
  });
});

function showError(msg) { errorDiv.textContent = msg; errorDiv.style.display = 'block'; }
</script>
</body>
</html>
